<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>三人日记本 · 液态玻璃+动画</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background:#1a1a2e; min-height:100vh; padding:20px 16px; position:relative; overflow-x:hidden; animation:bodyFadeIn 0.5s ease-out; }
        @keyframes bodyFadeIn { from { opacity:0; } to { opacity:1; } }
        body::before { content:''; position:fixed; top:-20%; left:-20%; width:140%; height:140%; background:radial-gradient(circle at 30% 40%, rgba(255,180,120,0.25), rgba(200,130,80,0.05), transparent 70%); pointer-events:none; z-index:0; animation:liquidMove 12s ease infinite; }
        body::after { content:''; position:fixed; bottom:-10%; right:-10%; width:120%; height:120%; background:radial-gradient(circle at 70% 80%, rgba(120,180,220,0.2), rgba(80,130,180,0.05), transparent 70%); pointer-events:none; z-index:0; animation:liquidMove2 15s ease infinite; }
        @keyframes liquidMove { 0% { transform:translate(0,0) rotate(0deg); opacity:0.6; } 50% { transform:translate(5%,5%) rotate(3deg); opacity:1; } 100% { transform:translate(0,0) rotate(0deg); opacity:0.6; } }
        @keyframes liquidMove2 { 0% { transform:translate(0,0) scale(1); opacity:0.4; } 50% { transform:translate(-3%,-3%) scale(1.05); opacity:0.7; } 100% { transform:translate(0,0) scale(1); opacity:0.4; } }
        .container { max-width:800px; margin:0 auto; position:relative; z-index:2; backdrop-filter:blur(20px) saturate(180%); background:rgba(30,30,45,0.35); border-radius:56px; padding:20px 16px; box-shadow:0 8px 32px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); animation:containerPop 0.4s cubic-bezier(0.2,0.9,0.4,1.1); }
        @keyframes containerPop { from { opacity:0; transform:scale(0.98) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }
        .hero { text-align:center; margin-bottom:24px; animation:heroFade 0.6s ease-out; }
        @keyframes heroFade { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
        .hero h1 { font-size:2rem; font-weight:700; background:linear-gradient(135deg,#fff8f0,#ffe0c0,#ffd0a0); background-clip:text; -webkit-background-clip:text; color:transparent; animation:textFloat 3s ease-in-out infinite; }
        @keyframes textFloat { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-3px); } }
        .hero p { color:rgba(255,240,220,0.9); font-size:0.8rem; font-weight:500; backdrop-filter:blur(10px); display:inline-block; padding:4px 16px; border-radius:60px; background:rgba(0,0,0,0.2); }
        .auth-bar { background:rgba(20,20,35,0.45); backdrop-filter:blur(20px); border-radius:80px; padding:8px 18px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; border:1px solid rgba(255,255,245,0.2); animation:slideDown 0.4s ease-out; }
        @keyframes slideDown { from { opacity:0; transform:translateY(-15px); } to { opacity:1; transform:translateY(0); } }
        .login-form { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        .login-form input { background:rgba(255,255,250,0.2); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.3); border-radius:60px; padding:8px 16px; font-size:0.85rem; color:white; outline:none; transition:all 0.2s ease; }
        .login-form input:focus { border-color:rgba(255,200,150,0.8); background:rgba(255,255,250,0.3); transform:scale(1.02); }
        .login-form button, .logout-btn { background:rgba(200,138,92,0.8); backdrop-filter:blur(4px); border:none; border-radius:60px; padding:8px 20px; color:white; font-weight:600; cursor:pointer; transition:all 0.2s cubic-bezier(0.2,0.9,0.4,1.1); }
        .login-form button:active, .logout-btn:active { transform:scale(0.94); background:rgba(200,138,92,1); }
        .welcome { font-weight:600; background:rgba(0,0,0,0.3); padding:6px 16px; border-radius:40px; font-size:0.9rem; color:#ffe6cc; }
        .search-box { background:rgba(20,20,35,0.45); backdrop-filter:blur(20px); border-radius:60px; display:flex; align-items:center; padding:8px 16px; gap:8px; margin-bottom:24px; border:1px solid rgba(255,255,255,0.2); transition:all 0.2s; animation:slideUp 0.4s ease-out 0.05s both; }
        @keyframes slideUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
        .search-box:focus-within { border-color:rgba(255,200,150,0.6); background:rgba(30,30,45,0.6); }
        .search-box input { background:none; border:none; outline:none; width:100%; font-size:0.9rem; color:white; }
        .diary-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom:20px; }
        .diary-card { background:rgba(255,252,245,0.25); backdrop-filter:blur(20px) saturate(180%); border-radius:32px; padding:16px; box-shadow:0 8px 20px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.2); border:1px solid rgba(255,255,245,0.3); transition:all 0.3s cubic-bezier(0.2,0.9,0.4,1.1); cursor:pointer; display:flex; flex-direction:column; color:#fff2e6; animation:cardFadeIn 0.4s cubic-bezier(0.2,0.9,0.4,1.1) backwards; }
        .diary-card:nth-child(1) { animation-delay:0.02s; } .diary-card:nth-child(2) { animation-delay:0.06s; } .diary-card:nth-child(3) { animation-delay:0.10s; } .diary-card:nth-child(4) { animation-delay:0.14s; } .diary-card:nth-child(5) { animation-delay:0.18s; } .diary-card:nth-child(6) { animation-delay:0.22s; }
        @keyframes cardFadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .diary-card:hover { transform:translateY(-4px); background:rgba(255,252,245,0.35); box-shadow:0 20px 30px -12px rgba(0,0,0,0.2); border-color:rgba(255,230,190,0.6); }
        .diary-card:active { transform:scale(0.98); transition:0.05s; }
        .diary-username { font-size:0.7rem; font-weight:600; color:#ffdfb3; background:rgba(0,0,0,0.3); backdrop-filter:blur(4px); display:inline-block; padding:4px 12px; border-radius:60px; margin-bottom:10px; align-self:flex-start; }
        .diary-title { font-weight:700; font-size:1.1rem; color:#ffffff; margin:6px 0 4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .diary-date { font-size:0.6rem; color:#ffdcb0; margin-bottom:8px; opacity:0.8; }
        .diary-content { font-size:0.78rem; color:#ffefdd; line-height:1.4; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:12px; }
        .diary-stats { display:flex; justify-content:space-between; align-items:center; margin-top:auto; font-size:0.7rem; }
        .like-btn { background:rgba(0,0,0,0.2); border:none; color:#ffdbb5; cursor:pointer; font-size:0.75rem; display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:40px; transition:all 0.15s cubic-bezier(0.2,0.9,0.4,1.1); }
        .like-btn:active { transform:scale(0.92); }
        .like-btn.liked { color:#ff6b6b; }
        .comment-count { display:flex; align-items:center; gap:5px; font-size:0.7rem; background:rgba(0,0,0,0.2); padding:4px 10px; border-radius:40px; }
        .diary-actions { display:flex; gap:8px; }
        .action-icon { background:rgba(0,0,0,0.2); border:none; color:#ffddb0; cursor:pointer; font-size:0.7rem; padding:5px 10px; border-radius:30px; transition:all 0.15s; }
        .action-icon:active { background:rgba(0,0,0,0.4); transform:scale(0.92); }
        .add-btn { background:rgba(200,138,92,0.8); backdrop-filter:blur(20px); border:none; border-radius:60px; padding:14px; color:white; font-weight:700; width:100%; cursor:pointer; font-size:1rem; transition:all 0.2s ease; animation:fadeUp 0.4s ease-out 0.2s both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .add-btn:active { transform:scale(0.97); }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); backdrop-filter:blur(30px); z-index:10000; align-items:center; justify-content:center; }
        .modal-content { background:rgba(30,30,45,0.65); backdrop-filter:blur(30px) saturate(180%); width:90%; max-width:500px; max-height:80vh; border-radius:48px; padding:24px; overflow-y:auto; border:1px solid rgba(255,255,255,0.3); box-shadow:0 30px 50px -20px rgba(0,0,0,0.5); color:#fff0e0; animation:modalPopIn 0.3s cubic-bezier(0.2,0.9,0.4,1.1) forwards; }
        @keyframes modalPopIn { from { opacity:0; transform:scale(0.92) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }
        .modal-content.closing { animation:modalPopOut 0.25s cubic-bezier(0.4,0,0.2,1) forwards !important; }
        @keyframes modalPopOut { from { opacity:1; transform:scale(1) translateY(0); } to { opacity:0; transform:scale(0.92) translateY(15px); } }
        .modal.fade-out { animation:modalFadeOut 0.25s ease forwards; }
        @keyframes modalFadeOut { from { backdrop-filter:blur(30px); background:rgba(0,0,0,0.4); } to { backdrop-filter:blur(0px); background:rgba(0,0,0,0); } }
        .modal-reply-item { background:rgba(255,245,235,0.15); backdrop-filter:blur(8px); border-radius:24px; padding:10px 14px; margin-bottom:10px; border:1px solid rgba(255,255,240,0.2); animation:replyItemFade 0.2s ease-out; }
        @keyframes replyItemFade { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
        .reply-header { display:flex; justify-content:space-between; font-size:0.7rem; color:#ffdbb5; margin-bottom:6px; }
        .reply-actions { display:flex; gap:10px; margin-top:8px; justify-content:flex-end; }
        .reply-form { display:flex; gap:10px; margin-top:16px; animation:slideInReply 0.2s ease-out; }
        @keyframes slideInReply { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .reply-input { flex:1; background:rgba(255,255,245,0.2); border:1px solid rgba(255,255,240,0.4); border-radius:60px; padding:10px 16px; font-size:0.85rem; outline:none; color:white; transition:all 0.2s; }
        .reply-input:focus { border-color:#ffcc99; background:rgba(255,255,245,0.3); transform:scale(1.01); }
        .reply-submit { background:#d9aa82; border:none; padding:0 20px; border-radius:60px; color:white; font-weight:600; cursor:pointer; transition:all 0.15s; }
        .reply-submit:active { transform:scale(0.94); }
        .close-modal { background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,240,0.3); padding:8px 24px; border-radius:60px; margin-top:16px; cursor:pointer; font-weight:500; color:white; transition:all 0.15s; }
        .close-modal:active { transform:scale(0.96); }
        footer { text-align:center; font-size:0.65rem; color:rgba(255,240,210,0.6); margin-top:20px; animation:footerFade 0.5s ease-out 0.3s both; }
        @keyframes footerFade { from { opacity:0; } to { opacity:1; } }
        @media (max-width:550px) { .diary-grid { gap:12px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1><i class="fas fa-water"></i> 三人日记本 <i class="fas fa-droplet"></i></h1>
        <p>液态玻璃 · 流动的诗</p>
    </div>
    <div id="authArea" class="auth-bar"></div>
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="搜索日记...">
    </div>
    <div id="diaryGrid" class="diary-grid"></div>
    <button id="addBtn" class="add-btn" style="display: none;"><i class="fas fa-plus-circle"></i> 写日记</button>
    <footer>☁️ 云端同步 · 点击卡片展开详情</footer>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<div id="writeModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-pen-fancy"></i> 新日记</h3>
        <input type="text" id="newTitle" placeholder="标题" style="width:100%; margin:10px 0; padding:12px; border-radius:60px; border:1px solid rgba(255,255,240,0.4); background: rgba(255,255,245,0.2); color:white;">
        <textarea id="newContent" rows="4" placeholder="写下你的心情..." style="width:100%; margin:10px 0; padding:12px; border-radius:28px; border:1px solid rgba(255,255,240,0.4); background: rgba(255,255,245,0.2); color:white;"></textarea>
        <div class="modal-buttons" style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 16px;">
            <button id="cancelWriteBtn" class="btn-cancel" style="background:rgba(0,0,0,0.4); border:none; padding:8px 20px; border-radius:60px; color:white;">取消</button>
            <button id="saveWriteBtn" class="btn-save" style="background:#c88a5c; border:none; padding:8px 20px; border-radius:60px; color:white;">保存</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://jjrwfiamjwryxkfpbopy.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqcndmaWFtandyeXhrZnBib3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjI1NjIsImV4cCI6MjA5MDczODU2Mn0.OUOGJp6JBjsHHelx9lbh_bE2rYeUh5QG0BuOtVN8cew";
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const usersDB = [
        { username: "苹果", password: "34679134" },
        { username: "周灿", password: "345187213" },
        { username: "甜心", password: "243157318" }
    ];

    let currentUser = null;
    let allDiaries = [];
    let allReplies = [];
    let searchKeyword = "";

    const authArea = document.getElementById("authArea");
    const diaryGrid = document.getElementById("diaryGrid");
    const addBtn = document.getElementById("addBtn");
    const searchInput = document.getElementById("searchInput");
    const detailModal = document.getElementById("detailModal");
    const modalContent = document.getElementById("modalContent");
    const writeModal = document.getElementById("writeModal");

    function saveCredentials(u,p) { localStorage.setItem("saved_username",u); localStorage.setItem("saved_password",p); }
    function clearCredentials() { localStorage.removeItem("saved_username"); localStorage.removeItem("saved_password"); }
    function getSavedCredentials() {
        const u = localStorage.getItem("saved_username");
        const p = localStorage.getItem("saved_password");
        return (u && p) ? { username: u, password: p } : null;
    }

    function renderAuthArea() {
        if (!currentUser) {
            const saved = getSavedCredentials();
            authArea.innerHTML = `
                <div class="login-form">
                    <input type="text" id="loginUsername" placeholder="用户名" value="${saved ? saved.username : ''}">
                    <input type="password" id="loginPassword" placeholder="密码" value="${saved ? saved.password : ''}">
                    <button id="doLoginBtn">登录</button>
                </div>
            `;
            document.getElementById("doLoginBtn")?.addEventListener("click", doLogin);
            addBtn.style.display = "none";
        } else {
            authArea.innerHTML = `<div class="welcome"><i class="fas fa-user-circle"></i> 欢迎，${currentUser}</div><button id="logoutBtn" class="logout-btn">登出</button>`;
            document.getElementById("logoutBtn")?.addEventListener("click", doLogout);
            addBtn.style.display = "block";
        }
    }

    function doLogin() {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        const user = usersDB.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = user.username;
            saveCredentials(username, password);
            renderAuthArea();
            refreshAllData();
        } else { alert("用户名或密码错误"); }
    }
    function doLogout() {
        currentUser = null;
        clearCredentials();
        renderAuthArea();
        allDiaries = []; allReplies = [];
        renderDiaryGrid();
        addBtn.style.display = "none";
    }
    async function autoLogin() {
        const saved = getSavedCredentials();
        if (saved && usersDB.find(u => u.username === saved.username && u.password === saved.password)) {
            currentUser = saved.username;
            renderAuthArea();
            await refreshAllData();
        } else { renderAuthArea(); }
    }

    async function loadDiaries() {
        const { data, error } = await sbClient.from('diaries').select('*').order('created_at', { ascending: false });
        if (error) { console.error(error); alert("加载日记失败"); return []; }
        return data || [];
    }
    async function loadReplies() {
        const { data, error } = await sbClient.from('replies').select('*').order('created_at', { ascending: true });
        if (error) { console.error(error); alert("加载回复失败"); return []; }
        return data || [];
    }
    
    // 修复：只在 diaries 表中添加 user_id: 0（replies 表没有 user_id 列）
    async function addDiary(title, content) {
        const now = new Date();
        const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        const newId = Date.now();
        const { error } = await sbClient.from('diaries').insert([{
            id: newId,
            user_id: 0,
            username: currentUser,
            title, content,
            date_str: dateStr,
            created_at: now.toISOString(),
            likes_count: 0, liked_by: []
        }]);
        if (error) { alert("保存失败: "+error.message); return false; }
        return true;
    }
    
    async function updateDiary(diaryId, newTitle, newContent) {
        const { error } = await sbClient.from('diaries').update({ title: newTitle, content: newContent }).eq('id', diaryId);
        if (error) { alert("更新失败: "+error.message); return false; }
        return true;
    }
    async function deleteDiary(diaryId) {
        await sbClient.from('replies').delete().eq('diary_id', diaryId);
        const { error } = await sbClient.from('diaries').delete().eq('id', diaryId);
        if (error) { alert("删除失败: "+error.message); return false; }
        return true;
    }
    
    // replies 表没有 user_id 列，所以不添加
    async function addReply(diaryId, content, parentReplyId = null) {
        const now = new Date();
        const newId = Date.now();
        const { error } = await sbClient.from('replies').insert([{
            id: newId,
            diary_id: diaryId,
            username: currentUser,
            content: content,
            parent_reply_id: parentReplyId,
            created_at: now.toISOString(),
            likes_count: 0, liked_by: []
        }]);
        if (error) { alert("回复失败: "+error.message); return false; }
        return true;
    }
    
    async function deleteReply(replyId) {
        const { error } = await sbClient.from('replies').delete().eq('id', replyId);
        if (error) { alert("删除回复失败: "+error.message); return false; }
        return true;
    }
    async function toggleLike(target, id, type) {
        const table = type === 'diary' ? 'diaries' : 'replies';
        const item = (type === 'diary' ? allDiaries : allReplies).find(i => i.id === id);
        if (!item) return;
        let liked_by = item.liked_by || [];
        let isLiked = liked_by.includes(currentUser);
        let newLikedBy, newLikesCount;
        if (isLiked) {
            newLikedBy = liked_by.filter(u => u !== currentUser);
            newLikesCount = (item.likes_count || 0) - 1;
        } else {
            newLikedBy = [...liked_by, currentUser];
            newLikesCount = (item.likes_count || 0) + 1;
        }
        const { error } = await sbClient.from(table).update({ likes_count: newLikesCount, liked_by: newLikedBy }).eq('id', id);
        if (error) { alert("点赞失败: "+error.message); return; }
        await refreshAllData();
    }

    async function refreshAllData() {
        if (!currentUser) return;
        allDiaries = await loadDiaries();
        allReplies = await loadReplies();
        renderDiaryGrid();
    }

    function renderDiaryGrid() {
        if (!currentUser) { diaryGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#ffeedd;">🔐 请先登录</div>`; return; }
        let list = allDiaries;
        if (searchKeyword.trim()) {
            const kw = searchKeyword.trim().toLowerCase();
            list = list.filter(d => d.title.toLowerCase().includes(kw) || d.content.toLowerCase().includes(kw));
        }
        if (list.length === 0) { diaryGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#ffeedd;">✨ 暂无日记，点击「写日记」开始</div>`; return; }
        diaryGrid.innerHTML = "";
        for (let diary of list) {
            const isOwn = diary.username === currentUser;
            const liked = (diary.liked_by || []).includes(currentUser);
            const replyCount = allReplies.filter(r => r.diary_id === diary.id).length;
            const card = document.createElement("div");
            card.className = "diary-card";
            card.innerHTML = `
                <div class="diary-username"><i class="fas fa-user-pen"></i> ${escapeHtml(diary.username)}</div>
                <div class="diary-title">${escapeHtml(diary.title)}</div>
                <div class="diary-date">${diary.date_str}</div>
                <div class="diary-content">${escapeHtml(diary.content)}</div>
                <div class="diary-stats">
                    <button class="like-btn ${liked ? 'liked' : ''}" data-id="${diary.id}" data-type="diary"><i class="fas fa-heart"></i> ${diary.likes_count || 0}</button>
                    <div class="comment-count"><i class="fas fa-comment"></i> ${replyCount}</div>
                    <div class="diary-actions">
                        ${isOwn ? `<button class="action-icon edit-diary" data-id="${diary.id}" data-title="${escapeHtml(diary.title)}" data-content="${escapeHtml(diary.content)}"><i class="fas fa-edit"></i></button>
                        <button class="action-icon delete-diary" data-id="${diary.id}"><i class="fas fa-trash-alt"></i></button>` : ''}
                    </div>
                </div>
            `;
            card.addEventListener("click", (e) => { if (!e.target.closest('.like-btn') && !e.target.closest('.action-icon')) openDetailModal(diary.id); });
            diaryGrid.appendChild(card);
        }
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.onclick = async (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                const type = btn.dataset.type;
                await toggleLike(type, id, type);
            };
        });
        document.querySelectorAll('.edit-diary').forEach(btn => {
            btn.onclick = async (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                const oldTitle = btn.dataset.title;
                const oldContent = btn.dataset.content;
                const newTitle = prompt("编辑标题", oldTitle);
                if (newTitle === null) return;
                const newContent = prompt("编辑内容", oldContent);
                if (newContent === null) return;
                await updateDiary(id, newTitle, newContent);
                await refreshAllData();
            };
        });
        document.querySelectorAll('.delete-diary').forEach(btn => {
            btn.onclick = async (e) => {
                e.stopPropagation();
                if (confirm("删除日记会删除所有回复，确定吗？")) {
                    await deleteDiary(parseInt(btn.dataset.id));
                    await refreshAllData();
                }
            };
        });
    }

    function closeModalWithAnimation(modalElement) {
        if (!modalElement) return;
        const content = modalElement.querySelector('.modal-content');
        if (content) {
            content.classList.add('closing');
            const onAnimationEnd = () => {
                modalElement.style.display = 'none';
                content.classList.remove('closing');
                content.removeEventListener('animationend', onAnimationEnd);
                modalElement.classList.remove('fade-out');
            };
            content.addEventListener('animationend', onAnimationEnd, { once: true });
            modalElement.classList.add('fade-out');
        } else {
            modalElement.style.display = 'none';
        }
    }

    async function openDetailModal(diaryId) {
        const diary = allDiaries.find(d => d.id === diaryId);
        if (!diary) return;
        const diaryReplies = allReplies.filter(r => r.diary_id === diaryId).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
        const repliesMap = new Map(); diaryReplies.forEach(r => repliesMap.set(r.id, r));
        function getReplyQuote(reply) {
            if (!reply.parent_reply_id) return null;
            const parent = repliesMap.get(reply.parent_reply_id);
            if (!parent) return null;
            return { username: parent.username, preview: parent.content.length>50?parent.content.slice(0,50)+"…":parent.content };
        }
        let repliesHtml = '';
        for (let rep of diaryReplies) {
            const quote = getReplyQuote(rep);
            const isOwnReply = rep.username === currentUser;
            const liked = (rep.liked_by || []).includes(currentUser);
            repliesHtml += `
                <div class="modal-reply-item">
                    <div class="reply-header">
                        <span><i class="fas fa-reply"></i> ${escapeHtml(rep.username)}</span>
                        <span>${new Date(rep.created_at).toLocaleString()}</span>
                    </div>
                    ${quote ? `<div style="background:rgba(0,0,0,0.2); border-radius:12px; padding:4px 8px; margin-bottom:6px; font-size:0.7rem;">↳ 回复 @${escapeHtml(quote.username)}：${escapeHtml(quote.preview)}</div>` : ''}
                    <div>${escapeHtml(rep.content)}</div>
                    <div class="reply-actions">
                        <button class="like-reply-btn" data-id="${rep.id}" data-type="reply" style="background:none; border:none; color:${liked?'#ff6b6b':'#ffdbb5'}; font-size:0.7rem;"><i class="fas fa-heart"></i> ${rep.likes_count||0}</button>
                        ${isOwnReply ? `<button class="delete-reply-btn" data-id="${rep.id}" style="background:none; border:none; color:#ffaa88; font-size:0.7rem;">🗑️ 删除</button>` : ''}
                        <button class="quote-reply-btn" data-id="${rep.id}" data-username="${escapeHtml(rep.username)}" data-content="${escapeHtml(rep.content)}" style="background:none; border:none; color:#ffcc99; font-size:0.7rem;">💬 回复</button>
                    </div>
                </div>
            `;
        }
        modalContent.innerHTML = `
            <div style="margin-bottom:12px;">
                <div class="diary-username" style="display:inline-block;">${escapeHtml(diary.username)}</div>
                <h3>${escapeHtml(diary.title)}</h3>
                <div style="font-size:0.7rem; color:#ffdcb0; margin-bottom:8px;">${diary.date_str}</div>
                <div style="white-space:pre-wrap; margin-bottom:16px;">${escapeHtml(diary.content)}</div>
            </div>
            <div style="border-top:1px solid rgba(255,255,240,0.3); padding-top:12px;">
                <strong>💬 回复 (${diaryReplies.length})</strong>
                <div id="modalRepliesList">${repliesHtml || '<div style="padding:12px; text-align:center;">暂无回复</div>'}</div>
                <div class="reply-form">
                    <input type="text" id="modalReplyInput" placeholder="写回复..." class="reply-input">
                    <button id="modalReplySubmit" class="reply-submit">发送</button>
                </div>
            </div>
            <div style="text-align:right; margin-top:16px;">
                <button id="closeModalBtn" class="close-modal">关闭</button>
            </div>
        `;
        detailModal.style.display = "flex";
        const modalContentElem = detailModal.querySelector('.modal-content');
        if (modalContentElem) modalContentElem.classList.remove('closing');
        detailModal.classList.remove('fade-out');

        document.getElementById("modalReplySubmit").onclick = async () => {
            const content = document.getElementById("modalReplyInput").value.trim();
            if (!content) return;
            const ok = await addReply(diaryId, content);
            if (ok) {
                await refreshAllData();
                openDetailModal(diaryId);
            }
        };
        document.querySelectorAll('.like-reply-btn').forEach(btn => {
            btn.onclick = async (e) => {
                const id = parseInt(btn.dataset.id);
                await toggleLike('reply', id, 'reply');
                openDetailModal(diaryId);
            };
        });
        document.querySelectorAll('.delete-reply-btn').forEach(btn => {
            btn.onclick = async (e) => {
                if (confirm("删除这条回复？")) {
                    await deleteReply(parseInt(btn.dataset.id));
                    await refreshAllData();
                    openDetailModal(diaryId);
                }
            };
        });
        document.querySelectorAll('.quote-reply-btn').forEach(btn => {
            btn.onclick = async () => {
                const parentId = parseInt(btn.dataset.id);
                const parentUsername = btn.dataset.username;
                const parentContent = btn.dataset.content;
                const preview = parentContent.length>60 ? parentContent.slice(0,60)+"…" : parentContent;
                const replyText = prompt(`回复 @${parentUsername}：\n“${preview}”\n\n输入你的回复：`);
                if (replyText && replyText.trim()) {
                    const ok = await addReply(diaryId, replyText.trim(), parentId);
                    if (ok) {
                        await refreshAllData();
                        openDetailModal(diaryId);
                    }
                }
            };
        });
        document.getElementById("closeModalBtn").onclick = () => closeModalWithAnimation(detailModal);
        detailModal.onclick = (e) => { if (e.target === detailModal) closeModalWithAnimation(detailModal); };
    }

    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    function openWriteModal() { 
        writeModal.style.display = "flex"; 
        const modalContentElem = writeModal.querySelector('.modal-content');
        if (modalContentElem) modalContentElem.classList.remove('closing');
        writeModal.classList.remove('fade-out');
        document.getElementById("newTitle").value = ""; 
        document.getElementById("newContent").value = ""; 
    }
    function closeWriteModal() { closeModalWithAnimation(writeModal); }
    async function saveNewDiary() {
        const title = document.getElementById("newTitle").value.trim();
        const content = document.getElementById("newContent").value.trim();
        if (!title && !content) { alert("请填写标题或内容"); return; }
        const ok = await addDiary(title || "无题", content || "");
        if (ok) { closeWriteModal(); await refreshAllData(); }
    }
    document.getElementById("addBtn").onclick = openWriteModal;
    document.getElementById("cancelWriteBtn")?.addEventListener("click", closeWriteModal);
    document.getElementById("saveWriteBtn")?.addEventListener("click", saveNewDiary);
    writeModal.onclick = (e) => { if (e.target === writeModal) closeWriteModal(); };
    searchInput.oninput = (e) => { searchKeyword = e.target.value; renderDiaryGrid(); };
    autoLogin();
</script>
</body>
</html>
